<div class="wrap">
  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 24px;">
    <div>
      <h1 style="font-size: 24px; font-weight: 500; margin: 0 0 6px 0; color: var(--color-text-primary);">Audit log</h1>
      <div style="color: var(--color-text-secondary); font-size: 13px;">Track system actions and governance events</div>
    </div>
  </div>

  <div class="card" style="padding: 0; overflow: hidden;">
    <table class="tbl" style="width: 100%;">
      <tr>
        <th style="padding: 12px 16px;">Timestamp</th>
        <th style="padding: 12px 16px;">User</th>
        <th style="padding: 12px 16px;">Action</th>
        <th style="padding: 12px 16px;">Details</th>
      </tr>
      <tr *ngFor="let log of logs">
        <td style="padding: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary);">{{ log.timestamp | date:'medium' }}</td>
        <td style="padding: 16px; font-weight: 500;">{{ log.username }}</td>
        <td style="padding: 16px;"><span class="badge b-blue">{{ log.action }}</span></td>
        <td style="padding: 16px; color: var(--color-text-secondary);">{{ log.details }}</td>
      </tr>
      <tr *ngIf="logs.length === 0">
        <td colspan="4" style="text-align:center;padding:50px 20px">
          <div style="font-size:15px;font-weight:500;color:var(--color-text-primary)">No audit logs found</div>
        </td>
      </tr>
    </table>
  </div>
</div>
