<div>
  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 32px;">
    <div>
      <h1 style="font-size: 24px; font-weight: 500; margin: 0 0 6px 0; color: var(--color-text-primary);">My profile</h1>
      <div style="color: var(--color-text-secondary); font-size: 13px;">Personal settings and display preferences</div>
    </div>
  </div>

  <div style="display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;">
    <!-- Left Column: Personal Info -->
    <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 24px;">
      
      <div class="card" style="display: flex; align-items: center; gap: 16px;">
        <div style="width: 48px; height: 48px; border-radius: 50%; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500;">
          {{ initials }}
        </div>
        <div>
          <div style="font-weight: 500; font-size: 16px; color: var(--color-text-primary);">{{ user.username || 'Unassigned User' }}</div>
          <div style="font-size: 13px; color: var(--color-text-secondary);">{{ user.email || 'No email associated' }}</div>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size: 16px; font-weight: 500; margin: 0 0 16px 0; color: var(--color-text-primary);">Account details</h3>
        
        <div class="form-grid">
          <div class="fg">
            <label class="fl">Display name</label>
            <input class="fi" [(ngModel)]="user.username" />
          </div>
          <div class="fg">
            <label class="fl">Email</label>
            <input class="fi" [value]="user.email" disabled style="background: var(--color-background-secondary); opacity: 0.7;" />
          </div>
        </div>
        
        <div style="margin-top: 16px;">
          <button class="tb-btn primary" style="background: #2563eb; color: white; border: none; font-weight: 500;" (click)="saveDetails()">Save changes</button>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size: 16px; font-weight: 500; margin: 0 0 16px 0; color: var(--color-text-primary);">My groups</h3>
        <div style="display: flex; gap: 8px;">
          <span class="badge b-blue" *ngFor="let group of user.groups">{{ group.groupName }}</span>
          <span *ngIf="!user.groups || user.groups.length === 0" style="font-size: 13px; color: var(--color-text-tertiary);">No groups assigned</span>
        </div>
      </div>

    </div>

    <!-- Right Column: Preferences -->
    <div style="flex: 1; min-width: 300px;">
      <div class="card">
        <h3 style="font-size: 16px; font-weight: 500; margin: 0 0 16px 0; color: var(--color-text-primary);">Preferences</h3>
        
        <div class="form-grid" style="display: flex; flex-direction: column; gap: 16px;">
          <div class="fg" style="margin-bottom: 0;">
            <label class="fl">Theme</label>
            <select class="fi" [(ngModel)]="preferences.theme">
              <option value="System default">System default</option>
              <option value="Light mode">Light mode</option>
              <option value="Dark mode">Dark mode</option>
            </select>
          </div>
          
          <div class="fg" style="margin-bottom: 0;">
            <label class="fl">Date format</label>
            <select class="fi" [(ngModel)]="preferences.dateFormat">
              <option value="YYYY-MM-DD">YYYY-MM-DD</option>
              <option value="MM/DD/YYYY">MM/DD/YYYY</option>
              <option value="DD/MM/YYYY">DD/MM/YYYY</option>
            </select>
          </div>
          
          <div class="fg" style="margin-bottom: 0;">
            <label class="fl">Timezone</label>
            <select class="fi" [(ngModel)]="preferences.timezone">
              <option value="America/New_York">America/New_York</option>
              <option value="Europe/London">Europe/London</option>
              <option value="Asia/Kolkata">Asia/Kolkata</option>
            </select>
          </div>
          
          <div class="fg" style="margin-bottom: 0;">
            <label class="fl">Default graph view</label>
            <select class="fi" [(ngModel)]="preferences.defaultGraphView">
              <option value="Domain level">Domain level</option>
              <option value="Table level">Table level</option>
              <option value="Column level">Column level</option>
            </select>
          </div>
        </div>
        
        <div style="margin-top: 24px;">
          <button class="tb-btn" style="background: transparent; border: 1px solid var(--color-border-tertiary);" (click)="savePreferences()">Save preferences</button>
        </div>
      </div>
    </div>

  </div>
</div>
