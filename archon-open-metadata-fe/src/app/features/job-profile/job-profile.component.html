<div id="p-jobs-all" class="page">

<div class="page-header">
  <div class="page-title">Job profiles</div>
</div>
<div class="card" *ngIf="!showForm">
  <div style="margin-bottom:16px"><button class="tb-btn primary" (click)="showForm = true; newJob = {}">Create new job</button></div>
  <table class="tbl">
    <tr><th>Job Name</th><th>Datasource</th><th>Template</th><th>Status</th><th>Actions</th></tr>
    <tr *ngFor="let job of jobs">
      <td>{{ job.jobName || 'Unnamed Job' }}</td>
      <td>{{ job.datasourceProfile?.profileName }}</td>
      <td>{{ job.jobTemplateProfile?.name }}</td>
      <td><span class="badge b-blue">{{ job.status || 'Pending' }}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="tb-btn" style="padding:3px 8px;color:var(--color-text-danger);border-color:var(--color-text-danger)" (click)="deleteJob(job.id)">Delete</button>
        </div>
      </td>
    </tr>
    <tr *ngIf="jobs.length === 0">
      <td colspan="5" style="text-align:center;padding:50px 20px">
        <div style="font-size:15px;font-weight:500;color:var(--color-text-primary)">No metadata jobs found</div>
      </td>
    </tr>
  </table>
</div>

<div class="card" *ngIf="showForm" style="max-width:560px">
  <div style="font-size:15px;font-weight:500;margin-bottom:16px">Create New Job</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">Job Name</label><input class="fi" [(ngModel)]="newJob.jobName" placeholder="e.g. Daily Sync" /></div>
    <div class="fg"><label class="fl">Datasource</label>
      <select class="fi" [(ngModel)]="newJob.datasourceId">
        <option *ngFor="let ds of datasources" [value]="ds.id">{{ ds.profileName }}</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Job Template</label>
      <select class="fi" [(ngModel)]="newJob.templateId">
        <option *ngFor="let tpl of jobTemplates" [value]="tpl.id">{{ tpl.name }}</option>
      </select>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:16px">
    <button class="tb-btn" (click)="showForm = false">Cancel</button>
    <button class="tb-btn primary" [disabled]="!newJob.jobName || !newJob.datasourceId || !newJob.templateId" (click)="createJob()">Create Job</button>
  </div>
</div>

</div>
